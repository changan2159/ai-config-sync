[project]
name = "serena-manager"
version = "0.1.0"
description = "Project-scoped Serena MCP instance manager and stdio bridge"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "anyio>=4.4.0",
  "filelock>=3.15.4",
  "httpx>=0.27.0",
  "mcp>=1.10.0",
  "psutil>=6.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0",
]

[dependency-groups]
dev = [
  "pytest>=8.2.0",
]

[project.scripts]
serena-manager = "serena_manager.cli:main"
serena-manager-launcher = "serena_manager.launcher:main"

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
